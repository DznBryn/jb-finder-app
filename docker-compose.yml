
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jb_finder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jb_finder_password}
      POSTGRES_DB: ${POSTGRES_DB:-jb_finder}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg2://jb_finder:jb_finder_password@postgres:5432/jb_finder}
      APP_ENV: ${APP_ENV:-development}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY:-}
      STRIPE_PRICE_ONETIME: ${STRIPE_PRICE_ONETIME:-}
      STRIPE_WEBHOOK_BYPASS: "${STRIPE_WEBHOOK_BYPASS:-false}"
      S3_BUCKET: ${S3_BUCKET:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-resumes}
    depends_on:
      - postgres

  # frontend:
  #   build:
  #     context: ./frontend
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   environment:
  #     NEXT_PUBLIC_API_BASE: http://localhost:8000
  #     APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql+psycopg2://jb_finder:jb_finder_password@postgres:5432/jb_finder}
  #     AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql+psycopg2://jb_finder:jb_finder_password@postgres:5432/jb_finder?options=-c%20search_path=auth}
  #     AUTH_SECRET: ${AUTH_SECRET:-}
  #     AUTH_URL: ${AUTH_URL:-http://localhost:3000}
  #     NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
  #     NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
  #     GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  #     GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  #     LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
  #     LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
  #   depends_on:
  #     - backend

  stripe:
    image: stripe/stripe-cli:latest
    depends_on:
      - backend
    command: listen --forward-to http://backend:8000/api/webhooks/stripe
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY:-}

volumes:
  postgres_data:
